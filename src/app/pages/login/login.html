<div class="login-page">

    <div class="login-card">

        <div class="login-header">

            <div class="logo">

                🛍️

            </div>

            <h1>

                Welcome Back

            </h1>

            <p>

                Sign in to continue to your account.

            </p>

        </div>

        <div class="form-group">

            <label>

                Email Address

            </label>

            <input

                class="form-control"

                type="email"

                placeholder="Enter your email"

                [(ngModel)]="loginData.email">

        </div>

        <div class="form-group">

            <label>

                Password

            </label>

            <input

                class="form-control"

                type="password"

                placeholder="Enter your password"

                [(ngModel)]="loginData.password">

        </div>

        <button

            class="login-btn"

            (click)="onLogin()">

            Login

        </button>

        <div class="divider">

            <span>

                OR

            </span>

        </div>

        <div class="register-section">

            <p>

                Don't have an account?

            </p>

 <button
    class="register-btn"
    routerLink="/register">
    Create Account
</button>

        </div>

    </div>

</div>
