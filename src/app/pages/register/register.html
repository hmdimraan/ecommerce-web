<div class="register-page">

    <div class="register-card">

        <div class="register-header">

            <div class="logo">

                🛍️

            </div>

            <h1>

                Create Account

            </h1>

            <p>

                Join us and start your shopping journey today.

            </p>

        </div>

        <div class="form-group">

            <label>

                Full Name

            </label>

            <input

                class="form-control"

                type="text"

                placeholder="Enter your full name"

                [(ngModel)]="registerData.name">

        </div>

        <div class="form-group">

            <label>

                Email Address

            </label>

            <input

                class="form-control"

                type="email"

                placeholder="Enter your email"

                [(ngModel)]="registerData.email">

        </div>

        <div class="form-group">

            <label>

                Password

            </label>

            <input

                class="form-control"

                type="password"

                placeholder="Create a password"

                [(ngModel)]="registerData.password">

        </div>

        <div class="form-group">

            <label>

                Phone Number

            </label>

            <input

                class="form-control"

                type="text"

                placeholder="Enter your phone number"

                [(ngModel)]="registerData.phone">

        </div>

        <div class="form-group">

            <label>

                Address

            </label>

            <textarea

                class="form-control"

                rows="4"

                placeholder="Enter your address"

                [(ngModel)]="registerData.address">

            </textarea>

        </div>

        <button

            class="register-btn"

            (click)="onRegister()">

            Create Account

        </button>

        <div class="divider">

            <span>

                OR

            </span>

        </div>

        <div class="login-section">

            <p>

                Already have an account?

            </p>

            <button
    class="login-btn"
    routerLink="/login">

    Login

</button>

        </div>

    </div>

</div>
